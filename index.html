<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="/src/style.css" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300..700&display=swap"
			rel="stylesheet"
		/>
		<title>Forecasting App</title>
	</head>
	<body>
		<div
			class="fixed inset-0 -z-10 bg-[url('https://wallpapercave.com/wp/wp9124580.jpg')] bg-cover bg-center bg-no-repeat"
		></div>

		<div
			id="app"
			class="min-h-screen flex-col h-screen w-full flex font-inter text-white"
		>
			<div id="cityBtn" class="flex flex-row px-6 pt-8 gap-3.5">
				<img id="geoImage" src="/imgs/geo.svg" alt="Geo image" />
				<p id="cityName" class="text-white text-2xl">City</p>
				<img
					id="arrow"
					src="/imgs/triangle.svg"
					alt="triangle image"
					class="transition-transform duration-300"
				/>
			</div>

			<div class="flex px-6">
				<button
					id="geoBtn"
					class="text-white font-medium text-xl mt-4 hover:bg-main-gray rounded-md p-1 transition duration-300"
				>
					Use current location
				</button>
			</div>

			<div id="weatherInfo" class="flex flex-col items-center gap-2">
				<div class="relative w-full flex justify-center mt-4 px-6">
					<div
						id="searchBar"
						class="absolute bg-black/40 backdrop-blur-sm flex items-center justify-center z-10 transition-all duration-300 opacity-0 scale-95 rounded-2xl px-4"
					>
						<input
							id="searchInput"
							type="text"
							placeholder="Enter a city..."
							class="w-full px-4 py-6 rounded-lg text-white text-[24px] focus:outline-none transition duration-300"
						/>

						<img
							id="searchBtn"
							class="leading-none hover:text-gray-300 w-8 h-8"
							src="/imgs/search.svg"
							alt="search image"
						/>
					</div>
				</div>

				<div
					id="weatherStatusDiv"
					class="flex flex-col items-center pt-25 gap-2"
				>
					<span class="text-3xl font-medium" id="weatherStatus">Weather</span>

					<img
						id="weatherImage"
						src="/imgs/icon.svg"
						class="w-44 h-44 py-6 px-6"
						alt="icon image"
					/>

					<span id="weatherDegree" class="text-6xl font-medium pb-2.5 m-auto"
						>10°</span
					>

					<span
						id="windNow"
						class="flex flex-row gap-5 items-center w-10 h-auto mr-40 my-2.5"
					>
						<img id="windImage" src="/imgs/wind.svg" alt="wind image" />
						<span id="windValue" class="text-2xl">none</span>
					</span>

					<span
						id="humidityNow"
						class="flex flex-row gap-5 items-center w-10 h-auto mr-40 my-2.5"
					>
						<img
							id="humidityImage"
							src="/imgs/humidity.svg"
							alt="humidity image"
						/>
						<span id="humidityPercent" class="text-2xl">none</span>
					</span>

					<span id="localTime" class="text-xl"></span>

					<button
						class="hidden text-white font-medium text-xl mt-4 hover:bg-main-gray rounded-md p-1 transition duration-300"
						id="forecast5Days"
					>
						Get Forecast for 5 Days
					</button>
				</div>
			</div>

			<div
				id="forecastContainer"
				class="flex flex-wrap gap-4 mt-6 justify-center px-4"
			></div>

			<footer class="w-full flex justify-end px-4 pb-3 mt-auto">
				<p class="text-inter font-medium text-xl text-right pt-5">
					Developed by
					<a
						href="https://github.com/phexuss/ezforecast"
						target="_blank"
						class="hover:bg-main-gray rounded-md p-1 transition duration-300"
						><span
							class="text-transparent bg-clip-text bg-linear-to-r from-gray-600 via-gray-400 to-white font-semibold"
							>phexuss</span
						></a
					>
				</p>
			</footer>
		</div>

		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
